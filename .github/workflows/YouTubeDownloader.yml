name: 🔍 YouTube Search & Download

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: '🔍 عبارت جستجو (برای جستجو)'
        required: false
        type: string
      url:
        description: '🎬 لینک مستقیم یوتیوب (برای دانلود)'
        required: false
        type: string
      type:
        description: '📦 نوع خروجی (برای دانلود)'
        required: false
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: '🎚️ کیفیت (720p, 1080p, یا 128kbps)'
        required: false
        type: string
        default: '720p'

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📂 Clone repository
        uses: actions/checkout@v4

      - name: 🔧 Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install yt-dlp
          echo "✅ yt-dlp version: $(yt-dlp --version)"

      # ============================================
      # حالت جستجو (اگر search_query پر شده باشد)
      # ============================================
      - name: 🔎 Search YouTube and show results
        if: ${{ github.event.inputs.search_query != '' && github.event.inputs.url == '' }}
        run: |
          SEARCH="${{ github.event.inputs.search_query }}"
          echo "🟢 جستجو برای: $SEARCH"
          echo "======================================"
          
          # روش جایگزین: استفاده از yt-dlp بدون jq برای جلوگیری از خطا
          yt-dlp --flat-playlist --print "%(title)s | %(channel)s | https://youtu.be/%(id)s" "ytsearch10:$SEARCH"
          
          echo "======================================"
          echo "✅ لینک مورد نظر را کپی کرده و دوباره workflow را با 'url' اجرا کنید."

      # ============================================
      # حالت دانلود (اگر url پر شده باشد)
      # ============================================
      - name: ⬇️ Download from URL
        if: ${{ github.event.inputs.url != '' }}
        run: |
          URL="${{ github.event.inputs.url }}"
          TYPE="${{ github.event.inputs.type }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          mkdir -p downloads
          cd downloads
          
          echo "🟢 شروع دانلود از: $URL"
          
          if [[ "$TYPE" == "audio" ]]; then
            # استخراج صدا با کیفیت 192kbps (پایدارتر)
            yt-dlp -f bestaudio --extract-audio --audio-format mp3 \
              --audio-quality 192K --output "%(title)s_%(id)s.%(ext)s" \
              --no-check-certificate \
              "$URL"
          else
            # دانلود ویدیو با کیفیت 720p (پایدارتر)
            yt-dlp -f "best[height<=720]" \
              --output "%(title)s_%(id)s.%(ext)s" \
              --no-check-certificate \
              "$URL"
          fi
          
          if [ $? -eq 0 ]; then
            echo "✅ دانلود کامل شد."
            ls -la
          else
            echo "❌ دانلود با خطا مواجه شد (exit code: $?)"
            exit 1
          fi
          
          cd ..

      - name: 📤 Commit and push downloaded files
        if: ${{ github.event.inputs.url != '' && success() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git diff --staged --quiet || git commit -m "chore: add YouTube content [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
