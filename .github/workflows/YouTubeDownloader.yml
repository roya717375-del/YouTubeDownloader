- name: 🔎 Search YouTube via Google/YouTube and save results
  if: ${{ github.event.inputs.search_query != '' && github.event.inputs.url == '' }}
  run: |
    SEARCH="${{ github.event.inputs.search_query }}"
    OUTPUT_FILE="search_results.txt"
    echo "🟢 جستجو برای: $SEARCH" | tee -a "$OUTPUT_FILE"
    echo "======================================" | tee -a "$OUTPUT_FILE"
    
    # نصب کتابخانه جستجو
    python3 -m pip install youtube-search-python
    
    # استفاده از پایتون برای جستجو
    python3 -c "
from youtubesearchpython import VideosSearch
import json

search_query = '$SEARCH'
videos_search = VideosSearch(search_query, limit=20)  # تعداد ۲۰ نتیجه
results = videos_search.result()

with open('$OUTPUT_FILE', 'a', encoding='utf-8') as f:
    for idx, video in enumerate(results['result'], 1):
        title = video['title']
        link = f\"https://youtube.com/watch?v={video['id']}\"
        f.write(f\"\n{idx}. 🎬 عنوان: {title}\n   🔗 لینک: {link}\n   {'-' * 60}\n\")
print('✅ جستجو با موفقیت انجام شد.')
"
    echo "======================================" | tee -a "$OUTPUT_FILE"
    echo "✅ نتایج در فایل 'search_results.txt' ذخیره شد."
# ... (بقیه مراحل آپلود فایل)
