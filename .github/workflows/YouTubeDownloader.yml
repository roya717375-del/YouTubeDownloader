name: 🔍 YouTube Search & Download

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: '🔍 عبارت جستجو (برای جستجو)'
        required: false
        type: string
      url:
        description: '🎬 لینک مستقیم یوتیوب (برای دانلود)'
        required: false
        type: string
      type:
        description: '📦 نوع خروجی (برای دانلود)'
        required: false
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: '🎚️ کیفیت (720p, 1080p, یا 128kbps)'
        required: false
        type: string
        default: '720p'

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📂 Clone repository
        uses: actions/checkout@v4

      - name: 🔧 Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install yt-dlp
          echo "✅ yt-dlp version: $(yt-dlp --version)"

      # ============================================
      # حالت جستجو (اگر search_query پر شده باشد)
      # ============================================
      - name: 🔎 Search YouTube and save results to file
        if: ${{ github.event.inputs.search_query != '' && github.event.inputs.url == '' }}
        run: |
          SEARCH="${{ github.event.inputs.search_query }}"
          OUTPUT_FILE="search_results.txt"
          
          echo "🟢 جستجو برای: $SEARCH"
          echo "======================================"
          echo "📝 نتایج جستجو برای: $SEARCH" > "$OUTPUT_FILE"
          echo "تاریخ جستجو: $(date)" >> "$OUTPUT_FILE"
          echo "======================================" >> "$OUTPUT_FILE"
          echo "" >> "$OUTPUT_FILE"
          
          # دریافت 20 نتیجه اول با توضیحات کامل
          echo "🟡 در حال دریافت 20 نتیجه اول..."
          
          # استفاده از yt-dlp با خروجی JSON برای اطلاعات کامل‌تر
          yt-dlp --flat-playlist --dump-json "ytsearch20:$SEARCH" | python3 << 'PYEOF'
          import sys, json
          results = []
          for line in sys.stdin:
              if line.strip():
                  try:
                      data = json.loads(line)
                      results.append(data)
                  except:
                      pass
          
          with open('search_results.txt', 'a', encoding='utf-8') as f:
              for idx, item in enumerate(results, 1):
                  title = item.get('title', 'بدون عنوان')
                  channel = item.get('channel', 'ناشناس')
                  video_id = item.get('id', '')
                  url = f"https://youtu.be/{video_id}"
                  duration = item.get('duration', 0)
                  if duration:
                      minutes = duration // 60
                      seconds = duration % 60
                      duration_str = f"{minutes}:{seconds:02d}"
                  else:
                      duration_str = "نامشخص"
                  description = item.get('description', '')
                  if description:
                      description = description[:200] + '...' if len(description) > 200 else description
                  else:
                      description = "توضیحاتی موجود نیست"
                  
                  f.write(f"\n{idx}. 🎬 عنوان: {title}\n")
                  f.write(f"   📺 کانال: {channel}\n")
                  f.write(f"   ⏱️ مدت: {duration_str}\n")
                  f.write(f"   🔗 لینک: {url}\n")
                  f.write(f"   📝 توضیحات: {description}\n")
                  f.write(f"   {'-' * 60}\n")
          
          print(f"✅ {len(results)} نتیجه در فایل search_results.txt ذخیره شد.")
          PYEOF
          
          echo "======================================"
          echo "✅ نتایج در فایل 'search_results.txt' ذخیره شد."
          echo "📁 برای مشاهده نتایج، فایل را از پوشه اصلی مخزن دانلود کنید."
          
          # نمایش خلاصه از نتایج در لاگ
          echo ""
          echo "📋 خلاصه نتایج:"
          head -30 search_results.txt

      # ============================================
      # حالت دانلود (اگر url پر شده باشد)
      # ============================================
      - name: ⬇️ Download from URL
        if: ${{ github.event.inputs.url != '' }}
        run: |
          URL="${{ github.event.inputs.url }}"
          TYPE="${{ github.event.inputs.type }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          mkdir -p downloads
          cd downloads
          
          echo "🟢 شروع دانلود از: $URL"
          
          if [[ "$TYPE" == "audio" ]]; then
            yt-dlp -f bestaudio --extract-audio --audio-format mp3 \
              --audio-quality 192K --output "%(title)s_%(id)s.%(ext)s" \
              --no-check-certificate \
              "$URL"
          else
            yt-dlp -f "best[height<=720]" \
              --output "%(title)s_%(id)s.%(ext)s" \
              --no-check-certificate \
              "$URL"
          fi
          
          if [ $? -eq 0 ]; then
            echo "✅ دانلود کامل شد."
            ls -la
          else
            echo "❌ دانلود با خطا مواجه شد (exit code: $?)"
            exit 1
          fi
          
          cd ..

      - name: 📤 Commit and push files (search results or downloaded files)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # اگر فایل نتایج جستجو وجود دارد، آن را هم اضافه کن
          if [ -f "search_results.txt" ]; then
            git add search_results.txt
            echo "✅ فایل نتایج جستجو به مخزن اضافه شد."
          fi
          
          # اگر پوشه دانلود وجود دارد و خالی نیست، آن را اضافه کن
          if [ -d "downloads" ] && [ "$(ls -A downloads)" ]; then
            git add downloads/
            echo "✅ فایل‌های دانلود شده به مخزن اضافه شدند."
          fi
          
          git diff --staged --quiet || git commit -m "chore: add YouTube search results or content [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
