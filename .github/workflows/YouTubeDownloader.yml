name: 🎯 YouTubeDownloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🎬 YouTube Video URL (یا خالی بذارید و از جستجو استفاده کنید)'
        required: false
        type: string
      search_query:
        description: '🔍 عبارت جستجو در یوتیوب'
        required: false
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: '🎚️ Quality (video: 144p/360p/480p/720p/1080p | audio: 64kbps/128kbps/192kbps/320kbps)'
        required: false
        type: string
        default: '720p'
      split_threshold_mb:
        description: '📦 Split files larger than (MB) — 0 = never'
        required: false
        type: number
        default: 90

jobs:
  download-and-process:
    name: 🚀 Download & Process YouTube Content
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📂 Clone Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip curl jq ffmpeg python3 python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install yt-dlp
          echo "✅ yt-dlp version: $(yt-dlp --version)"

      - name: 🔍 Convert Search Query to URL (if needed)
        id: search
        run: |
          set -e
          if [[ -n "${{ github.event.inputs.search_query }}" && -z "${{ github.event.inputs.url }}" ]]; then
            SEARCH_TERM="${{ github.event.inputs.search_query }}"
            echo "🔎 Searching YouTube for: $SEARCH_TERM"
            VIDEO_URL=$(yt-dlp --get-id "ytsearch1:$SEARCH_TERM" --print "https://youtu.be/%(id)s" 2>/dev/null)
            if [[ -z "$VIDEO_URL" ]]; then
              echo "❌ No video found for: $SEARCH_TERM"
              exit 1
            fi
            echo "✅ Found video: $VIDEO_URL"
            echo "YT_URL=$VIDEO_URL" >> $GITHUB_ENV
          elif [[ -n "${{ github.event.inputs.url }}" ]]; then
            echo "YT_URL=${{ github.event.inputs.url }}" >> $GITHUB_ENV
          else
            echo "❌ Either 'url' or 'search_query' must be provided."
            exit 1
          fi

      - name: ⬇️ Direct Download with yt-dlp
        id: download
        run: |
          YT_URL="${{ env.YT_URL }}"
          OUTPUT_TYPE="${{ github.event.inputs.type }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          mkdir -p ./downloads/temp
          cd ./downloads/temp
          
          echo "🎬 Downloading from: $YT_URL"
          echo "📦 Type: $OUTPUT_TYPE | Quality: $QUALITY"
          
          # Set format based on type and quality
          if [[ "$OUTPUT_TYPE" == "audio" ]]; then
            # Normalize audio bitrate
            BITRATE=$(echo "$QUALITY" | sed 's/kbps//')
            case $BITRATE in
              64|128|192|320) ;;
              *) BITRATE=192 ;;
            esac
            FORMAT="bestaudio[ext=m4a]/bestaudio"
            EXT="mp3"
            # yt-dlp command for audio
            yt-dlp -f "$FORMAT" \
              --extract-audio \
              --audio-format mp3 \
              --audio-quality "$BITRATE" \
              --output "%(title)s_%(id)s_${BITRATE}kbps.%(ext)s" \
              --no-playlist \
              --restrict-filenames \
              --progress \
              "$YT_URL"
          else
            # Video: map quality to format code
            case "$QUALITY" in
              "144p")  FORMAT="bestvideo[height<=144]+bestaudio/best[height<=144]" ;;
              "360p")  FORMAT="bestvideo[height<=360]+bestaudio/best[height<=360]" ;;
              "480p")  FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
              "720p")  FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
              "1080p") FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
              *)       FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
            esac
            EXT="mp4"
            yt-dlp -f "$FORMAT" \
              --merge-output-format mp4 \
              --output "%(title)s_%(id)s_${QUALITY}.%(ext)s" \
              --no-playlist \
              --restrict-filenames \
              --progress \
              "$YT_URL"
          fi
          
          # Get downloaded filename (there should be exactly one file)
          DOWNLOADED_FILE=$(ls -1 | head -1)
          if [[ -z "$DOWNLOADED_FILE" ]]; then
            echo "❌ No file downloaded!"
            exit 1
          fi
          
          ORIGINAL_NAME="$DOWNLOADED_FILE"
          # Clean up filename (remove any weird chars)
          SAFE_NAME=$(echo "$ORIGINAL_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
          if [[ "$ORIGINAL_NAME" != "$SAFE_NAME" ]]; then
            mv "$ORIGINAL_NAME" "$SAFE_NAME"
            DOWNLOADED_FILE="$SAFE_NAME"
          fi
          
          echo "✅ Downloaded: $DOWNLOADED_FILE"
          cd ../..
          echo "FILENAME=$DOWNLOADED_FILE" >> $GITHUB_ENV
          echo "FILEPATH=./downloads/temp/$DOWNLOADED_FILE" >> $GITHUB_ENV

      - name: ✂️ Smart Split Large Files
        run: |
          THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          THRESHOLD_BYTES=$((THRESHOLD_MB * 1024 * 1024))
          FILEPATH="${{ env.FILEPATH }}"
          FILENAME="${{ env.FILENAME }}"
          
          if [[ ! -f "$FILEPATH" ]]; then
            echo "❌ File not found: $FILEPATH"
            exit 1
          fi
          
          SIZE=$(stat -c%s "$FILEPATH")
          SIZE_MB=$((SIZE / 1024 / 1024))
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📄 File: $FILENAME"
          echo "📏 Size: ${SIZE_MB} MB"
          
          if [[ $THRESHOLD_BYTES -gt 0 && $SIZE -gt $THRESHOLD_BYTES ]]; then
            echo "✂️ Splitting file (threshold=${THRESHOLD_MB}MB)"
            cd ./downloads
            zip -r -s "${THRESHOLD_MB}m" "${FILENAME}.zip" "temp/${FILENAME}"
            cd ..
            PARTS_COUNT=$(ls ./downloads/${FILENAME}.z* 2>/dev/null | wc -l)
            echo "✅ Created $PARTS_COUNT parts"
            rm "$FILEPATH"
          else
            if [[ $THRESHOLD_BYTES -eq 0 ]]; then
              echo "📁 Split disabled, moving file"
            else
              echo "📁 File under threshold, moving file"
            fi
            mv "$FILEPATH" "./downloads/"
          fi
          
          rm -rf ./downloads/temp
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📂 Final files in ./downloads/:"
          ls -lh ./downloads/ 2>/dev/null | tail -n +2 | awk '{print "  • " $NF " (" $5 ")"}'

      - name: 📤 Commit and Push to Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add ./downloads/
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          mapfile -t STAGED_FILES < <(git diff --staged --name-only)
          TOTAL_FILES=${#STAGED_FILES[@]}
          
          echo "📦 Found $TOTAL_FILES file(s) to upload"
          git reset HEAD ./downloads/
          
          BATCH_SIZE=5
          for (( i=0; i<TOTAL_FILES; i+=BATCH_SIZE )); do
            BATCH_NUM=$((i / BATCH_SIZE + 1))
            END=$((i + BATCH_SIZE))
            [[ $END -gt $TOTAL_FILES ]] && END=$TOTAL_FILES
            
            echo "🚀 Uploading batch $BATCH_NUM [$((i+1))–${END} of $TOTAL_FILES]"
            
            for (( j=i; j<END; j++ )); do
              git add "${STAGED_FILES[$j]}"
            done
            
            git commit -m "chore: add YouTube content batch $BATCH_NUM [skip ci]"
            git pull --rebase origin "$BRANCH" || true
            git push origin "HEAD:$BRANCH"
            
            echo "✅ Batch $BATCH_NUM uploaded"
          done
          
          echo "🎉 All files successfully uploaded to $BRANCH"
