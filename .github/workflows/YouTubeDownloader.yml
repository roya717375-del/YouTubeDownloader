name: 🎯 YouTube Downloader (GitHub Only)

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: '🔍 عبارت جستجو در یوتیوب'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'

jobs:
  download-and-process:
    name: 🚀 Download & Process YouTube Content
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📂 Clone Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip ffmpeg
          python3 -m pip install yt-dlp
          echo "✅ yt-dlp installed successfully"

      - name: 🔍 Search and Download
        id: download
        run: |
          SEARCH_TERM="${{ github.event.inputs.search_query }}"
          OUTPUT_TYPE="${{ github.event.inputs.type }}"
          
          mkdir -p downloads
          cd downloads
          
          echo "🔎 Searching YouTube for: $SEARCH_TERM"
          
          # Search and get video URL without external API
          if [[ "$OUTPUT_TYPE" == "audio" ]]; then
            # Download as MP3
            yt-dlp -f bestaudio \
              --extract-audio \
              --audio-format mp3 \
              --audio-quality 192K \
              --output "%(title)s_%(id)s.%(ext)s" \
              --no-playlist \
              --restrict-filenames \
              "ytsearch1:$SEARCH_TERM"
          else
            # Download as MP4 (best quality available)
            yt-dlp -f "bestvideo+bestaudio" \
              --merge-output-format mp4 \
              --output "%(title)s_%(id)s.%(ext)s" \
              --no-playlist \
              --restrict-filenames \
              "ytsearch1:$SEARCH_TERM"
          fi
          
          # Get downloaded filename
          DOWNLOADED_FILE=$(ls -1 | head -1)
          if [[ -z "$DOWNLOADED_FILE" ]]; then
            echo "❌ Download failed!"
            exit 1
          fi
          
          echo "✅ Downloaded: $DOWNLOADED_FILE"
          cd ..
          echo "FILENAME=$DOWNLOADED_FILE" >> $GITHUB_ENV

      - name: 📤 Commit and Push to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add downloads/
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: add YouTube content [skip ci]"
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin HEAD:"${{ github.ref_name }}"
          
          echo "🎉 File successfully uploaded to repository"
